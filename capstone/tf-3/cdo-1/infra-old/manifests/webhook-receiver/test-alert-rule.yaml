# PrometheusRule: tạo alert giả để trigger luồng Alertmanager → receiver → AI Engine.
# Apply sau khi cả Prometheus (observability namespace) và patch-receiver đã running.
#
# Alert này fire khi pod my-app trong namespace default có restart count > 0,
# hoặc dùng alert "AlwaysFiring" (expr: vector(1)) để test ngay không cần điều kiện.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: self-heal-test-rules
  namespace: observability
  labels:
    # Label này phải khớp với ruleSelector của Prometheus trong helm values.
    # kube-prometheus-stack mặc định pick up rule không cần label đặc biệt
    # nếu ruleSelectorNilUsesHelmValues: false (đã set trong PR #47).
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: self-heal-test
      interval: 30s
      rules:
        # Alert 1: LUÔN FIRE — dùng để test ngay, không cần điều kiện thật
        - alert: TestAlwaysFiring
          expr: vector(1)
          for: 0m
          labels:
            severity: warning
            namespace: tenant-payment
            pod: test-pod-fake
            alertname: TestAlwaysFiring
            tenant_id: d3b07384-d113-495f-9f58-20d18d357d75
          annotations:
            summary: "Test alert luôn fire — để verify luồng receiver → AI Engine"
            description: "Đây là alert giả. Nếu logs của patch-receiver thấy /v1/detect và /v1/decide thì luồng đang chạy đúng."

        # Alert 2: THỰC TẾ — fire khi pod trong namespace default restart nhiều lần
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="default"}[5m]) > 2
          for: 1m
          labels:
            severity: critical
            tenant_id: d3b07384-d113-495f-9f58-20d18d357d75
          annotations:
            summary: "Pod {{ $labels.pod }} đang CrashLoop"
            description: "Pod {{ $labels.pod }} trong namespace {{ $labels.namespace }} restart {{ $value }} lần trong 5 phút."
