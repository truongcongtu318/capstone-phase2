# ClusterIP — đúng theo deployment-contract.md mục 2.C (In-Cluster Service,
# http://ai-engine.self-heal-system.svc.cluster.local:8080/). Trust model: Local Trust
# qua HTTP nội bộ thuần (telemetry-contract §C: kênh là HTTP nội bộ; ai-api-contract:
# đã bỏ SigV4). mTLS chỉ là tùy chọn (deployment-contract §70), không bắt buộc.
# Vì không còn auth tầng app lẫn TLS, việc giới hạn truy cập 8080 DỰA HOÀN TOÀN vào
# NetworkPolicy (xem networkpolicy.yaml). KHÔNG tạo LoadBalancer/Ingress public.
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: self-heal-system
spec:
  type: ClusterIP
  selector:
    app: ai-engine
  ports:
    - port: 8080
      targetPort: 8080
