# ============================================================
# deployment.yaml - webhook-receiver (base)
# Sở hữu: Member 7 (khung manifest) — code thật do Member 4 (Sub-team 2)
#
# ĐÂY LÀ PLACEHOLDER: dùng nginx tạm để ArgoCD sync thành công và
# test được Sync Wave/RBAC/NetworkPolicy ngay hôm nay. Khi Member 4
# build xong image thật, đổi lại:
#   image: 544011261607.dkr.ecr.us-east-1.amazonaws.com/webhook-receiver:<commit-sha>
#   containerPort: 8443 (thay vì 80 của nginx)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  labels:
    app: webhook-receiver
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Nginx placeholder requires writeable cache"
    ignore-check.kube-linter.io/run-as-non-root: "Nginx placeholder requires root privileges for port 80"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: webhook-receiver
      containers:
        - name: webhook-receiver
          # PLACEHOLDER (sandbox): nginx:1.25 — EKS NAT-less runtime phải dùng
          # ECR mirror: 544011261607.dkr.ecr.us-east-1.amazonaws.com/mirror/nginx:1.25
          # TODO: đổi sang image ECR Private khi Sub-team 2 (Member 4) build xong
          # image: 544011261607.dkr.ecr.us-east-1.amazonaws.com/webhook-receiver:<commit-sha>
          image: 474013238625.dkr.ecr.us-east-1.amazonaws.com/tf-3-webhook-receiver
          ports:
            - containerPort: 8443
              name: https
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
