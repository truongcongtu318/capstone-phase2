# ============================================================
# configmap.yaml - webhook-receiver
# Sync Wave: "-2" — apply trước Deployment (Wave 0)
# ST2 Handoff: nội dung thật thay thế placeholder
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-receiver-config
  labels:
    app: webhook-receiver
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  AWS_DEFAULT_REGION: "us-east-1"
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/474013238625/tf3-cdo1-sandbox-self-heal-queue"
  DYNAMODB_LOCK_TABLE: "tf-3-aiops-app-idempotency-lock"
  COOLDOWN_SECONDS_BASIC_TIER: "300"
  COOLDOWN_SECONDS_PRO_TIER: "180"
  # Cooldown per namespace — set to 1s for OOMKill pattern testing; revert to 180/300 after
  COOLDOWN_PAYMENT_SECONDS: "1"
  COOLDOWN_CHECKOUT_SECONDS: "1"
  DRY_RUN: "false"
