# ============================================================
# configmap.yaml - webhook-receiver
# Sở hữu: Member 7 (khung) — nội dung thật do Member 4 (Sub-team 2)
# Sync Wave: "-2"
#
# PLACEHOLDER: chỉ đủ để test thứ tự Sync Wave -2 chạy trước Wave -1/0.
# Nội dung thật (cooldown timeout theo tenant tier, DynamoDB table
# name, SQS queue URL...) sẽ điền khi Member 4 xác nhận cấu hình.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-receiver-config
  labels:
    app: webhook-receiver
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  # TODO: điền giá trị thật khi có
  PLACEHOLDER_KEY: "placeholder-value"
  # Ví dụ field thật sẽ cần (theo project-rules.md mục V.1):
  # COOLDOWN_SECONDS_BASIC_TIER: "300"
  # COOLDOWN_SECONDS_PRO_TIER: "180"
  # DYNAMODB_LOCK_TABLE: "tf-3-aiops-idempotency-lock"
