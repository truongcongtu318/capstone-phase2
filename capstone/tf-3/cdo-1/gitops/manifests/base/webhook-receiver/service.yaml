apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  labels:
    app: webhook-receiver
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  type: ClusterIP
  selector:
    app: webhook-receiver
  ports:
    - name: metrics
      port: 8443
      # TODO: đổi targetPort thành 8443 khi container thật lắng nghe đúng cổng này.
      # Hiện đang trỏ tạm vào port 80 của nginx placeholder.
      targetPort: 80
      protocol: TCP
