# ============================================================
# external-secret.yaml - sqs-worker
# Sync Wave: "-2" — apply trước Secret (Wave -1) và Deployment (Wave 0)
#
# Kéo ARGOCD_AUTH_TOKEN từ AWS Secrets Manager vào K8s Secret
# sqs-worker-argocd-secret, mount qua envFrom trong Deployment.
#
# TODO: Xác nhận với ST2 secret name trong Secrets Manager.
# ARGOCD_AUTH_TOKEN tạo bằng: argocd account generate-token --account worker
# hoặc qua ESO sau khi ST2 xác nhận flow.
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sqs-worker-argocd-secret
  labels:
    app: sqs-worker
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: sqs-worker-argocd-secret
    creationPolicy: Owner
  data:
    - secretKey: ARGOCD_AUTH_TOKEN
      remoteRef:
        key: tf3-cdo1-sandbox/argocd-auth-token
        property: token
