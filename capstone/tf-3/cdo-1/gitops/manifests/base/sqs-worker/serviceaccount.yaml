# ============================================================
# serviceaccount.yaml - sqs-worker
# ServiceAccount chính thức: self-heal-executor
# Tên này đồng bộ với security-policies/rbac.yaml ClusterRole binding.
#
# TODO khi lên EKS thật: thêm annotation IRSA:
#   eks.amazonaws.com/role-arn: arn:aws:iam::544011261607:role/<irsa-self-heal-executor>
# Trên Kind local, annotation IRSA không có hiệu lực (an toàn bỏ qua).
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: self-heal-executor
  labels:
    app: sqs-worker
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::474013238625:role/tf3-cdo1-sandbox-irsa-audit-writer
