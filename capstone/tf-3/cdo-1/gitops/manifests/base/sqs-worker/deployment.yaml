# ============================================================
# deployment.yaml - sqs-worker (base)
# Sở hữu: Member 7 (khung) — code thật do Member 5/6 (Sub-team 2)
#
# PLACEHOLDER: dùng busybox sleep tạm (không cần expose port, vì
# sqs-worker là background daemon, không phải HTTP server).
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-worker
  labels:
    app: sqs-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqs-worker
  template:
    metadata:
      labels:
        app: sqs-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # ServiceAccount đồng bộ với security-policies/rbac.yaml
      serviceAccountName: self-heal-executor
      containers:
        - name: sqs-worker
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # image: 544011261607.dkr.ecr.us-east-1.amazonaws.com/sqs-worker:<commit-sha>
          image: 474013238625.dkr.ecr.us-east-1.amazonaws.com/tf-3-self-heal-worker
          ports:
            - containerPort: 9090
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          envFrom:
            - configMapRef:
                name: sqs-worker-config
          env:
            - name: ARGOCD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-token
                  key: token
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
