# ============================================================
# deployment.yaml - sqs-worker (base)
# Sở hữu: Member 7 (khung) — code thật do ST2 (Member 5/6) bàn giao
#
# ST2 Handoff: image ECR thật tf-3-self-heal-worker, port metrics 9090.
# Worker là SQS daemon, không expose HTTP app port — chỉ /metrics trên 9090.
# Image tag sha-PENDING — override tại overlays/sandbox/sqs-worker/kustomization.yaml.
# ============================================================
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-worker
  labels:
    app: sqs-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqs-worker
  template:
    metadata:
      labels:
        app: sqs-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      serviceAccountName: self-heal-executor
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: sqs-worker
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # ST2 Handoff image — tag được override tại sandbox overlay
          image: 474013238625.dkr.ecr.us-east-1.amazonaws.com/tf-3-self-heal-worker:sha-PENDING
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: SQS_QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/474013238625/tf3-cdo1-sandbox-self-heal-queue"
            - name: SNS_TOPIC_ARN
              value: "arn:aws:sns:us-east-1:474013238625:tf3-cdo1-sandbox-alerts-escalation"
            - name: FIREHOSE_STREAM_NAME
              value: "tf3-cdo1-sandbox-audit-stream"
            - name: DYNAMODB_TABLE_NAME
              value: "tf-3-aiops-app-idempotency-lock"
            - name: DYNAMODB_STATE_TABLE
              value: "tf-3-aiops-app-state"
            - name: AI_ENGINE_URL
              value: "http://ai-engine.self-heal-system.svc.cluster.local:8080"
            - name: PROMETHEUS_URL
              value: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090"
            - name: PROMETHEUS_QUERY_WINDOW_SECONDS
              value: "600"
            - name: PROMETHEUS_QUERY_STEP_SECONDS
              value: "30"
            - name: DRY_RUN
              value: "false"
            - name: ARGOCD_SERVER_URL
              value: "https://argocd-server.argocd.svc.cluster.local"
            - name: CODECOMMIT_REPO_URL
              value: "codecommit::us-east-1://tf3-cdo1-sandbox-gitops"
            - name: CODECOMMIT_BRANCH
              value: "main"
            # ── Tracing: tắt hoàn toàn Amazon OpenTelemetry Distro (bao gồm
            # cả XRay sampler và ServiceEvents instrumentation)
            # vì ADOT Collector (cloudwatch-agent.amazon-cloudwatch)
            # chưa được cài lên cluster. Bật lại khi operators.tf deploy xong.
            - name: OTEL_SDK_DISABLED
              value: "true"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            # Tắt XRay sampler (kết nối port 2000)
            - name: OTEL_TRACES_SAMPLER
              value: "always_off"
            # Tắt ServiceEvents instrumentation layer riêng của Amazon Distro
            - name: AMAZON_SERVICEEVENTS_ENABLED
              value: "false"
          envFrom:
            - secretRef:
                name: sqs-worker-argocd-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
