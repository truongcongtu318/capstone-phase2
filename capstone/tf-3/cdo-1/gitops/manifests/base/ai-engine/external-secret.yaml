# ============================================================
# external-secret.yaml - ai-engine
# Sở hữu: Member 7
# Sync Wave: "-2"
#
# Kéo "fake-bedrock-credentials-source" (giả lập AWS Secrets Manager)
# thành Secret đích "ai-engine-bedrock-secret" mà Deployment dùng.
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-engine-external-secret
  namespace: self-heal-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ai-engine-secretstore
    kind: SecretStore
  target:
    name: ai-engine-bedrock-secret
    creationPolicy: Owner
  data:
    - secretKey: bedrock-api-key
      remoteRef:
        key: fake-bedrock-credentials-source
        property: bedrock-api-key
