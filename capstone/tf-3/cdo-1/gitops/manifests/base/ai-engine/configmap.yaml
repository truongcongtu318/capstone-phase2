# ============================================================
# configmap.yaml - ai-engine (real detect_decide_verify engine)
# Sync Wave: "-2" — apply trước Deployment (Wave 0)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-engine-config
  labels:
    app: ai-engine
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  # CDO-01 platform profile (baked vào image tại ./adr/)
  PLATFORM_PROFILE_PATH: "./adr/platform_profile_cdo01.json"
  PLATFORM_PROFILE_SCHEMA_PATH: "./adr/platform_profile.schema.json"
  DATASET_DIR: "./adr"
  RUNBOOKS_PATH: "./adr/runbooks.json"
  DEPENDENCY_GRAPH_PATH: "./adr/dependency_graph.json"

  # CDO-01 namespace/system identity
  SYSTEM_NAME: "CDO-CHECKOUT-PAYMENT"
  DEFAULT_NAMESPACE: "tenant-checkout"
  DEFAULT_SERVICE: "checkout-api"
  DEFAULT_DEPLOYMENT_TEMPLATE: "deployment/{{target_service}}"
  ALLOWED_NAMESPACES: "tenant-checkout,tenant-payment"

  # API server — port 8080 theo CDO contract
  API_HOST: "0.0.0.0"
  API_PORT: "8080"

  # LLM decision (bật để xem reasoning; tắt cho chạy rule-based thuần)
  USE_LLM_DECISION: "True"
  USE_LLM_FAULT_TYPE: "False"
  LLM_PROVIDER: "bedrock"
  LLM_MODEL: "us.meta.llama4-scout-17b-instruct-v1:0"
  AWS_REGION: "us-east-1"

  # Telemetry mode — bench: CDO gửi telemetry_window trực tiếp trong request
  TELEMETRY_RUNTIME_MODE: "bench"
  BENCH_TELEMETRY_SOURCE_KIND: "benchmark_fixture"

  # RCA hyperparameters
  # LƯU Ý: BASELINE_LENGTH KHÔNG có tác dụng với /v1/detect live — engine.py
  # tự tính baseline_len = max(10, int(N*0.8)) từ số điểm nhận được, bỏ qua
  # biến này (chỉ dùng cho benchmark offline /v1/benchmark/e2e). Giữ lại đây
  # chỉ để khỏi phá benchmark, đừng kỳ vọng nó ảnh hưởng alert thật.
  USE_BARO_RCA: "True"
  BARO_TOP_K: "3"
  BASELINE_LENGTH: "50"
  BOCPD_HAZARD: "3"         # nhạy hơn nữa cho series ngắn (sqs-worker gửi ~15-60 điểm thật); was 10
  ANALYSIS_WINDOW_SIZE: "10"  # chỉ ảnh hưởng RCA sau khi đã detect được, không ảnh hưởng detect
  CORRELATION_THRESHOLD: "0.25"
