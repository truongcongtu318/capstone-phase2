# ============================================================
# serviceaccount.yaml - ai-engine
# TUYỆT ĐỐI KHÔNG gắn ClusterRole/Role nào cho ServiceAccount này.
# AI Engine không cần quyền K8s API, chỉ gọi Bedrock qua IRSA.
# (Zero Trust: Brain vs Hands — ai-engine không có quyền patch cluster)
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-engine
  labels:
    app: ai-engine
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::474013238625:role/tf3-cdo1-sandbox-irsa-ai-engine-bedrock
