# ============================================================
# secretstore.yaml - ai-engine
# Sở hữu: Member 7
# Sync Wave: "-2"
#
# PROVIDER HIỆN TẠI: "kubernetes" (đọc Secret nội bộ cluster) - dùng
# tạm để test luồng ESO mà không cần AWS Secrets Manager thật.
#
# TODO khi lên EKS production: đổi block "provider" thành:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: ai-engine
# (yêu cầu ServiceAccount ai-engine có annotation IRSA trỏ role có
# quyền secretsmanager:GetSecretValue - xác nhận ARN với Sub-team 1)
# ============================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ai-engine-secretstore
  namespace: self-heal-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider:
    kubernetes:
      remoteNamespace: self-heal-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: ai-engine
