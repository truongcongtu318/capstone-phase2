# ============================================================
# fake-source-secret.yaml - ai-engine
# Sở hữu: Member 7
# Sync Wave: "-2" (cùng wave với SecretStore/ExternalSecret)
#
# ĐÂY LÀ FAKE PROVIDER: giả lập secret "đến từ AWS Secrets Manager"
# bằng 1 K8s Secret thường, để test luồng SecretStore -> ExternalSecret
# -> Secret đích mà không cần AWS thật. Khi lên EKS production, file
# này XÓA BỎ HOÀN TOÀN, và SecretStore (bên dưới) đổi provider sang
# "aws" thật (xem TODO trong secretstore.yaml).
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: fake-bedrock-credentials-source
  namespace: self-heal-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
  bedrock-api-key: "fake-placeholder-key-for-testing-only"
