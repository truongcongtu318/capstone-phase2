# ============================================================
# deployment.yaml - ai-engine (base)
# Sở hữu: Member 7 (khung) — model/code thật do AI team
#
# PLACEHOLDER: nginx tạm, lắng nghe port 80 thay cho 8080 thật.
#
# QUAN TRỌNG (Zero Trust): khi đổi sang image thật, PHẢI verify image
# đó KHÔNG chứa kubeconfig, KHÔNG cài kubectl/K8s SDK. ServiceAccount
# dưới đây CHƯA gắn RBAC nào (đúng ý đồ).
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  labels:
    app: ai-engine
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Nginx placeholder requires writeable cache"
    ignore-check.kube-linter.io/run-as-non-root: "Nginx placeholder requires root privileges for port 80"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      serviceAccountName: ai-engine
      containers:
        - name: ai-engine
          # PLACEHOLDER (sandbox): nginx:1.25 — EKS NAT-less runtime phải dùng
          # ECR mirror: 544011261607.dkr.ecr.us-east-1.amazonaws.com/mirror/nginx:1.25
          # TODO: đổi sang image ECR Private khi AI team build xong
          # image: 544011261607.dkr.ecr.us-east-1.amazonaws.com/ai-engine:<commit-sha>
          image: nginx:1.25
          ports:
            - containerPort: 80 # TODO: đổi thành 8080 khi có code thật
          resources:
            requests:
              memory: "1024Mi"
              cpu: "500m"
            limits:
              memory: "2048Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
