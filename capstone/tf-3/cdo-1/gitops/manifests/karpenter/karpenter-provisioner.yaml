apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  instanceProfile: tf3-cdo1-sandbox-karpenter-node-profile
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "tf3-cdo1-sandbox-eks"
  securityGroupSelectorTerms:
    - tags:
        Name: "sg-eks-workload"
  amiSelectorTerms:
    - id: "ami-0b7b393f2fbf6f220"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t", "c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
  limits:
    cpu: 10
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
