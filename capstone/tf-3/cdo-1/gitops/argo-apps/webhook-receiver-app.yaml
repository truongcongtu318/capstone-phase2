apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webhook-receiver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/truongcongtu318/capstone-phase2.git
    targetRevision: HEAD
    path: capstone/tf-3/cdo-1/gitops/manifests/overlays/sandbox/webhook-receiver
  destination:
    server: https://kubernetes.default.svc
    namespace: self-heal-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
