# ============================================================
# security-policies-app.yaml
# Sở hữu: Member 7
# Sync Wave: "-3" — deploy sau Namespace(-4), trước Config(-2)
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    # Đã đổi từ GitHub (test) → CodeCommit (production) theo Contract K8s
    repoURL: https://git-codecommit.us-east-1.amazonaws.com/v1/repos/tf3-cdo1-sandbox-gitops
    targetRevision: main
    path: capstone/tf-3/cdo-1/gitops/security-policies
  destination:
    server: https://kubernetes.default.svc
    # Không set namespace chung ở đây để giữ nguyên namespace khai báo trong rbac.yaml 
    # (tenant-payment, tenant-checkout) thay vì bị override toàn bộ về self-heal-system.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
