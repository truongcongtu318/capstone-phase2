# ============================================================
# webhook-netpolicy.yaml
# Sở hữu: Member 7
# Sync Wave: "-3"
#
# Webhook Receiver mở port 8443 (theo contract chính thức /alerts —
# GIẢ ĐỊNH TẠM, chưa confirm với Sub-team 2, xem README gốc).
# Chỉ nhận Ingress từ Alertmanager (namespace observability).
#
# LƯU Ý: label pod thật của Alertmanager do Helm chart
# kube-prometheus-stack tự sinh ra (thường là
# app=alertmanager + app.kubernetes.io/instance=<release-name>).
# Member 8 PHẢI xác nhận lại label thật sau khi Helm install xong,
# rồi cập nhật namespaceSelector/podSelector dưới đây nếu khác.
#
# Test case: pod KHÔNG nằm trong namespace observability,
# curl webhook-receiver.self-heal-system.svc.cluster.local:8443
# PHẢI bị reject/timeout.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: webhook-netpolicy
  namespace: self-heal-system
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  podSelector:
    matchLabels:
      app: webhook-receiver
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # 1. Custom/local test label
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app: alertmanager
        # 2. Standard kube-prometheus-stack Helm chart labels
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
        # 3. Alternative Helm chart label format
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchExpressions:
              - key: alertmanager
                operator: Exists
      ports:
        - protocol: TCP
          port: 8443
  egress:
    # DNS resolution (CoreDNS trong kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Egress to SQS & DynamoDB VPC Endpoints (port 443) trong private subnets
    - to:
        - ipBlock:
            cidr: 10.42.32.0/20
        - ipBlock:
            cidr: 10.42.48.0/20
      ports:
        - protocol: TCP
          port: 443
