commonLabels:
  app.kubernetes.io/part-of: cdo1-self-heal
  app.kubernetes.io/managed-by: terraform

defaultRules:
  create: true
  rules:
    etcd: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    windows: false

kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

windowsMonitoring:
  enabled: false

prometheusOperator:
  enabled: true

  image:
    registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
    repository: prometheus-operator/prometheus-operator
    tag: v0.74.0
    pullPolicy: IfNotPresent

  prometheusConfigReloader:
    image:
      registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.74.0

  admissionWebhooks:
    enabled: true
    patch:
      enabled: true
      image:
        registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
        repository: ingress-nginx/kube-webhook-certgen
        tag: v1.4.1
        pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

prometheus:
  enabled: true

  service:
    type: ClusterIP

  prometheusSpec:
    image:
      registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
      repository: prometheus/prometheus
      tag: v2.52.0

    replicas: 1
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s
    enableAdminAPI: false

    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability

    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

alertmanager:
  enabled: true

  service:
    type: ClusterIP

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by:
        - alertname
        - namespace
        - service
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"

    receivers:
      - name: "null"

  alertmanagerSpec:
    image:
      registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
      repository: prometheus/alertmanager
      tag: v0.27.0

    replicas: 1
    retention: 72h

    alertmanagerConfigSelector:
      matchLabels:
        cdo1-alert-routing: "enabled"

    alertmanagerConfigNamespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability

    alertmanagerConfigMatcherStrategy:
      type: None

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

grafana:
  enabled: true

  image:
    registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
    repository: grafana/grafana
    tag: 10.4.3
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP

  ingress:
    enabled: false

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: false

  sidecar:
    image:
      registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
      repository: kiwigrid/k8s-sidecar
      tag: 1.27.4

    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability

    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      isDefaultDatasource: true
      name: Prometheus
      uid: prometheus

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kube-state-metrics:
  enabled: true

  image:
    registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.12.0
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

prometheus-node-exporter:
  enabled: true

  image:
    registry: 544011261607.dkr.ecr.us-east-1.amazonaws.com
    repository: prometheus/node-exporter
    tag: v1.8.1
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
