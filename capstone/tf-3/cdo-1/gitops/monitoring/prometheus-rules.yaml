apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cdo1-self-heal-alerts
  namespace: observability
  labels:
    cdo1-monitoring: "enabled"
    app.kubernetes.io/part-of: cdo1-self-heal
spec:
  groups:
    - name: cdo1.kubernetes
      interval: 30s
      rules:
        - alert: PodOOMKilled
          expr: |
            max_over_time(
              kube_pod_container_status_last_terminated_reason{
                namespace=~"tenant-payment|tenant-checkout",
                reason="OOMKilled"
              }[5m]
            ) > 0
          for: 30s
          labels:
            severity: critical
            service: '{{ $labels.pod }}'
          annotations:
            summary: 'Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled'
            description: 'Container {{ $labels.container }} in namespace {{ $labels.namespace }} terminated because it exceeded its memory limit.'

        - alert: PodCrashLooping
          expr: |
            max_over_time(
              kube_pod_container_status_waiting_reason{
                namespace=~"tenant-payment|tenant-checkout",
                reason="CrashLoopBackOff"
              }[5m]
            ) >= 1
          for: 2m
          labels:
            severity: critical
            service: '{{ $labels.pod }}'
          annotations:
            summary: 'Pod {{ $labels.pod }} is in CrashLoopBackOff'
            description: 'Container {{ $labels.container }} in namespace {{ $labels.namespace }} has remained in CrashLoopBackOff for more than 2 minutes.'

    - name: cdo1.aws
      interval: 30s
      rules:
        - alert: QueueBacklog
          expr: |
            tf3_cdo1_sqs_visible_messages{
              queue="tf3-cdo1-sandbox-alert-queue"
            } > 100
          for: 5m
          labels:
            severity: warning
            namespace: self-heal-system
            pod: sqs-worker
            container: sqs-worker
            service: sqs-worker
          annotations:
            summary: 'SQS self-heal queue backlog is too high'
            description: 'Queue tf3-cdo1-sandbox-alert-queue has more than 100 visible messages for over 5 minutes.'
