apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: cdo1-self-heal-routing
  namespace: observability
  labels:
    cdo1-alert-routing: "enabled"
    app.kubernetes.io/part-of: cdo1-self-heal
spec:
  route:
    # Prometheus Operator bắt buộc root route phải có receiver, kể cả khi
    # mọi alert thật đều được match bởi routes[] bên dưới. Dùng làm fallback
    # câm (không webhookConfigs) cho alert nào lọt qua 2 matcher namespace.
    receiver: unmatched-alerts
    groupBy: ["alertname", "namespace", "service"]
    groupWait: 10s
    groupInterval: 30s
    # 4h là giá trị production (chống spam thông báo cho alert đang active liên
    # tục). Hạ xuống 2m cho giai đoạn test lặp nhanh — PHẢI revert về 4h trước
    # khi nộp bài, nếu không mỗi pod OOMKilling liên tục sẽ tự spam SQS/AI Engine
    # mỗi 2 phút thay vì chỉ báo 1 lần/4h như thiết kế.
    repeatInterval: 2m
    routes:
      - matchers:
          - name: namespace
            value: "tenant-payment"
        receiver: webhook-tenant-payment
      - matchers:
          - name: namespace
            value: "tenant-checkout"
        receiver: webhook-tenant-checkout

  # LƯU Ý: WebhookConfig.httpConfig (CRD v1alpha1) không có field "headers" —
  # chỉ có authorization/basicAuth/oauth2/tlsConfig/proxyURL/followRedirects.
  # Header X-Tenant-Id tuỳ ý KHÔNG THỂ gửi qua Alertmanager thật (K8s API âm
  # thầm prune field lạ không có trong OpenAPI schema của CRD — không lỗi,
  # không cảnh báo). Dùng query param trên URL thay thế; webhook-receiver
  # đọc "tenant_id" query param khi thiếu header X-Tenant-Id.
  receivers:
    - name: unmatched-alerts
    - name: webhook-tenant-payment
      webhookConfigs:
        - url: "http://webhook-receiver.self-heal-system.svc.cluster.local:8443/alerts?tenant_id=d3b07384-d113-495f-9f58-20d18d357d75"
          sendResolved: false
    - name: webhook-tenant-checkout
      webhookConfigs:
        - url: "http://webhook-receiver.self-heal-system.svc.cluster.local:8443/alerts?tenant_id=6c8b4b2b-4d45-4209-a1b4-4b532d56a31c"
          sendResolved: false
