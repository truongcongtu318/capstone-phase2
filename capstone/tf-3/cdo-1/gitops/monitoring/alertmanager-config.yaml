apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: cdo1-self-heal-routing
  namespace: observability
  labels:
    cdo1-alert-routing: "enabled"
    app.kubernetes.io/part-of: cdo1-self-heal
spec:
  route:
    # Prometheus Operator bắt buộc root route phải có receiver, kể cả khi
    # mọi alert thật đều được match bởi routes[] bên dưới. Dùng làm fallback
    # câm (không webhookConfigs) cho alert nào lọt qua 2 matcher namespace.
    receiver: unmatched-alerts
    groupBy: ["alertname", "namespace", "service"]
    groupWait: 10s
    groupInterval: 30s
    repeatInterval: 4h
    routes:
      - matchers:
          - name: namespace
            value: "tenant-payment"
        receiver: webhook-tenant-payment
      - matchers:
          - name: namespace
            value: "tenant-checkout"
        receiver: webhook-tenant-checkout

  receivers:
    - name: unmatched-alerts
    - name: webhook-tenant-payment
      webhookConfigs:
        - url: "http://webhook-receiver.self-heal-system.svc.cluster.local:8443/alerts"
          sendResolved: false
          httpConfig:
            headers:
              - key: "X-Tenant-Id"
                value: "d3b07384-d113-495f-9f58-20d18d357d75"
    - name: webhook-tenant-checkout
      webhookConfigs:
        - url: "http://webhook-receiver.self-heal-system.svc.cluster.local:8443/alerts"
          sendResolved: false
          httpConfig:
            headers:
              - key: "X-Tenant-Id"
                value: "6c8b4b2b-4d45-4209-a1b4-4b532d56a31c"
