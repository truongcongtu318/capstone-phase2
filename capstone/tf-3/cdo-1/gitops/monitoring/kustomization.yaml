apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - prometheus-rules.yaml
  - alertmanager-config.yaml

configMapGenerator:
  - name: cdo1-self-heal-dashboard
    files:
      - self-heal-overview.json=dashboards/self-heal-overview.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: cdo1-self-heal