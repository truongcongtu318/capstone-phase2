# NetworkPolicy cho AI Engine — implement deployment-contract.md §5.A (Ingress) & §5.B (Egress).
#
# VÌ SAO BẮT BUỘC: ai-api-contract đã bỏ SigV4 (auth tầng app) và telemetry-contract
# đổi kênh sang HTTP nội bộ thuần (bỏ TLS). Local Trust giờ KHÔNG còn lớp auth/TLS nào
# backstop — toàn bộ việc giới hạn ai được POST vào ai-engine:8080 phụ thuộc DUY NHẤT
# vào NetworkPolicy này. deployment-contract §5 cũng ghi rõ: bảo mật mạng cho AI Engine
# dựa vào K8s Network Policy, KHÔNG phải AWS Security Group.
#
# YÊU CẦU: CNI phải hỗ trợ NetworkPolicy. EKS với VPC CNI mặc định KHÔNG enforce
# NetworkPolicy trừ khi bật (`enableNetworkPolicy = true`) hoặc cài Calico.
# TODO(INFRA-4/eks hoặc INFRA-8): bật Network Policy enforcement cho cluster.
#
# TODO trước khi apply: điền <CLUSTER_POD_CIDR> / <API_SERVER_CIDR> (xem mục Egress).
---
# §5.A — Mặc định DENY toàn bộ ingress/egress của các pod trong namespace.
# (deny-all làm nền, các policy allow bên dưới mở đúng những gì contract cho phép.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-engine-default-deny
  namespace: self-heal-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# §5.A — Ingress: CHỈ cho phép traffic vào cổng 8080 của AI Engine xuất phát từ
# pod có label hợp lệ trong namespace hệ thống (CDO Self-Heal Controller / Telemetry
# Forwarder). Chặn Internet và mọi namespace nghiệp vụ khác.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-engine-allow-ingress
  namespace: self-heal-system
spec:
  podSelector:
    matchLabels:
      app: ai-engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Caller cùng namespace self-heal-system có label hợp lệ.
        # Label `app=cdo-self-heal-controller` lấy nguyên văn từ deployment-contract §5.A.
        - podSelector:
            matchLabels:
              app: cdo-self-heal-controller
      ports:
        - protocol: TCP
          port: 8080
---
# §5.B — Egress: CHỈ cho phép HTTPS (443) ra AWS VPC Endpoints (S3, DynamoDB, Bedrock)
# + DNS. CẤM gọi ngược lại K8s API Server (kubernetes.default.svc).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-engine-allow-egress
  namespace: self-heal-system
spec:
  podSelector:
    matchLabels:
      app: ai-engine
  policyTypes:
    - Egress
  egress:
    # DNS resolution (kube-dns / CoreDNS trong kube-system).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS 443 ra ngoài (VPC Endpoints) — loại trừ dải pod nội cluster và API server
    # để thực thi "cấm egress vào lại K8s API Server".
    # TODO: thay <CLUSTER_POD_CIDR> = dải pod/VPC CIDR (xem docs/02_infra_design.md §VPC
    #       và output module networking), <API_SERVER_CIDR> = /32 của EKS API endpoint
    #       nếu muốn chặn chính xác. ipBlock.except KHÔNG resolve DNS nên phải dùng CIDR.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - <CLUSTER_POD_CIDR> # vd 10.0.0.0/16 — chặn egress nội cluster + API server
      ports:
        - protocol: TCP
          port: 443
