name: Terraform Networking

on:
  push:
    branches: [main]
    paths:
      - "capstone/tf-3/cdo-1/infra/environments/sandbox/networking/**"
      - "capstone/tf-3/cdo-1/infra/modules/networking/**"
      - "capstone/tf-3/cdo-1/infra/modules/security/**"
      - ".github/workflows/terraform-pipeline.yml"
  pull_request:
    branches: [main, infra/platform-base]
    paths:
      - "capstone/tf-3/cdo-1/infra/environments/sandbox/networking/**"
      - "capstone/tf-3/cdo-1/infra/modules/networking/**"
      - "capstone/tf-3/cdo-1/infra/modules/security/**"
      - ".github/workflows/terraform-pipeline.yml"

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.7.5
  TF_WORKING_DIR: capstone/tf-3/cdo-1/infra/environments/sandbox/networking

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::474013238625:role/github-ci-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::474013238625:role/github-ci-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
