name: GitOps & Manifests Validation

on:
  push:
    branches: [main]
    paths:
      - "capstone/tf-3/cdo-1/gitops/**"
  pull_request:
    branches: [main]
    paths:
      - "capstone/tf-3/cdo-1/gitops/**"

permissions:
  contents: read

jobs:
  validate-manifests:
    name: Lint & Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Kube-linter
        run: |
          curl -sSfL -O https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux.tar.gz
          tar -xzf kube-linter-linux.tar.gz
          mkdir -p $HOME/.kube-linter/bin
          mv kube-linter $HOME/.kube-linter/bin/
          echo "$HOME/.kube-linter/bin" >> $GITHUB_PATH

      - name: Run Kube-linter
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: capstone/tf-3/cdo-1/gitops/

      - name: Validate YAML Syntax
        run: |
          # Check định dạng YAML (hỗ trợ cả tệp chứa nhiều document phân tách bằng ---)
          python3 -c "import yaml, glob; [list(yaml.safe_load_all(open(f))) for f in glob.glob('capstone/tf-3/cdo-1/gitops/**/*.yaml', recursive=True) if '/templates/' not in f]"

  sync-to-codecommit:
    name: Sync GitOps to AWS CodeCommit
    needs: validate-manifests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git operations

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::474013238625:role/tf3-cdo1-sandbox-github-ci-apply
          aws-region: us-east-1

      - name: Sync with CodeCommit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true
          
          echo "🔄 Setting up CodeCommit remote..."
          git remote add codecommit https://git-codecommit.us-east-1.amazonaws.com/v1/repos/tf3-cdo1-sandbox-gitops || git remote set-url codecommit https://git-codecommit.us-east-1.amazonaws.com/v1/repos/tf3-cdo1-sandbox-gitops
          
          echo "⬇️ Fetching latest from CodeCommit..."
          git fetch codecommit
          
          echo "🔀 Rebasing GitHub changes on top of CodeCommit (preserving Self-Heal commits)..."
          if git ls-remote --exit-code --heads codecommit main >/dev/null 2>&1; then
            # -X theirs forces Git to favor GitHub's code (current branch) in any conflict with CodeCommit (upstream)
            git pull --rebase -X theirs codecommit main || {
              echo "⚠️ Rebase failed due to conflicts — aborting"
              git rebase --abort 2>/dev/null || true
              exit 1
            }
          else
            echo "⚠️ Remote branch 'main' does not exist yet. Skipping pull."
          fi
          
          echo "🚀 Pushing synchronized code to CodeCommit..."
          git push codecommit HEAD:main
