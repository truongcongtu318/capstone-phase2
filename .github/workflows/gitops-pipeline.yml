name: GitOps & Manifests Validation

on:
  push:
    branches: [main]
    paths:
      - "capstone/tf-3/cdo-1/gitops/**"
  pull_request:
    branches: [main]
    paths:
      - "capstone/tf-3/cdo-1/gitops/**"

permissions:
  contents: read

jobs:
  validate-manifests:
    name: Lint & Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Kube-linter
        run: |
          curl -sSfL -O https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux.tar.gz
          tar -xzf kube-linter-linux.tar.gz
          mkdir -p $HOME/.kube-linter/bin
          mv kube-linter $HOME/.kube-linter/bin/
          echo "$HOME/.kube-linter/bin" >> $GITHUB_PATH

      - name: Run Kube-linter
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: capstone/tf-3/cdo-1/gitops/

      - name: Validate YAML Syntax
        run: |
          # Check định dạng YAML (hỗ trợ cả tệp chứa nhiều document phân tách bằng ---)
          python3 -c "import yaml, glob; [list(yaml.safe_load_all(open(f))) for f in glob.glob('capstone/tf-3/cdo-1/gitops/**/*.yaml', recursive=True) if '/templates/' not in f]"

  sync-to-codecommit:
    name: Sync GitOps to AWS CodeCommit
    needs: validate-manifests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git operations

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::474013238625:role/tf3-cdo1-sandbox-github-ci-apply
          aws-region: us-east-1

      - name: Sync GitOps folder to CodeCommit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true
          
          echo "🔄 Cloning CodeCommit repository..."
          git clone https://git-codecommit.us-east-1.amazonaws.com/v1/repos/tf3-cdo1-sandbox-gitops codecommit-repo
          
          echo "📁 Syncing GitOps manifests..."
          # Clean target directory except .git metadata
          find codecommit-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          
          # Copy only the contents of the gitops directory to the root of the target repo
          cp -r capstone/tf-3/cdo-1/gitops/* codecommit-repo/
          
          cd codecommit-repo
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "GitOps manifests sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "🚀 Pushing changes to CodeCommit..."
            git push origin main
          else
            echo "⚠️ No changes to sync"
          fi

