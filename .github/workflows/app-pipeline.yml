name: Application CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'capstone/tf-3/cdo-1/app/**'
      - 'capstone/tf-3/ai/demo/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'capstone/tf-3/cdo-1/app/**'
      - 'capstone/tf-3/ai/demo/**'

permissions:
  id-token: write
  contents: write

jobs:
  test-and-lint:
    name: Lint and Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks cần full history để scan diff giữa các commit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx fastapi uvicorn
          pip install -r capstone/tf-3/cdo-1/app/webhook-receiver/requirements.txt
          pip install -r capstone/tf-3/cdo-1/app/sqs-worker/requirements.txt
          pip install moto[dynamodb,sqs] jsonschema python-dotenv pyyaml \
                      prometheus-fastapi-instrumentator prometheus-client

      - name: Run Ruff Linter
        run: ruff check capstone/tf-3/cdo-1/app/

      - name: Run Unit Tests
        run: |
          python -m pytest capstone/tf-3/cdo-1/app/ \
            --cov=capstone/tf-3/cdo-1/app/ \
            --cov-fail-under=70

  build-and-publish:
    name: Build & Push ECR
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - app: webhook-receiver
            dir: capstone/tf-3/cdo-1/app/webhook-receiver
            ecr_repo: tf-3-webhook-receiver
          - app: self-heal-worker
            dir: capstone/tf-3/cdo-1/app/sqs-worker
            ecr_repo: tf-3-self-heal-worker
          - app: ai-engine-demo
            dir: capstone/tf-3/ai/demo/app
            ecr_repo: tf-3-ai-engine-demo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::474013238625:role/tf3-cdo1-sandbox-github-ci-apply
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy shared security.py for sqs-worker
        if: matrix.app == 'self-heal-worker'
        run: |
          cp capstone/tf-3/cdo-1/app/webhook-receiver/src/security.py \
             capstone/tf-3/cdo-1/app/sqs-worker/src/security.py

      - name: Ensure ECR Repository Exists
        env:
          ECR_REPOSITORY: ${{ matrix.ecr_repo }}
        run: |
          aws ecr describe-repositories --repository-name "$ECR_REPOSITORY" --region us-east-1 >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$ECR_REPOSITORY" \
              --region us-east-1 \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256

      - name: Build, Tag and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.ecr_repo }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          cd ${{ matrix.dir }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Built $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  update-gitops:
    name: Update GitOps Image Tags
    needs: build-and-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update kustomization newTag
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          OVERLAY=capstone/tf-3/cdo-1/gitops/manifests/overlays/sandbox
          sed -i "s/newTag: sha-.*/newTag: $IMAGE_TAG/" $OVERLAY/webhook-receiver/kustomization.yaml
          sed -i "s/newTag: sha-.*/newTag: $IMAGE_TAG/" $OVERLAY/sqs-worker/kustomization.yaml
          sed -i "s/newTag: sha-.*/newTag: $IMAGE_TAG/" $OVERLAY/ai-engine/kustomization.yaml

      - name: Commit and push
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capstone/tf-3/cdo-1/gitops/manifests/overlays/sandbox/
          git diff --cached --quiet && echo "No tag change, skipping commit" && exit 0
          git commit -m "chore(gitops): update image tags to $IMAGE_TAG [skip ci]"
          git push origin main
